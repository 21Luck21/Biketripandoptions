<style>
  :root{
    --paper:#f3efe7;
    --paper-2:#ebe5d8;
    --ink:#1f2418;
    --ink-soft:#4a4f3f;
    --ink-mute:#7a7868;
    --moss:#3d5942;
    --moss-deep:#243321;
    --clay:#b96f3a;
    --clay-deep:#8a4a22;
    --lake:#5b7d7a;
    --rule:rgba(31,36,24,.18);
    --paper-rule:rgba(31,36,24,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'Fraunces',Georgia,serif;-webkit-font-smoothing:antialiased}
  body{overflow-x:hidden}
  .mono{font-family:'JetBrains Mono',ui-monospace,monospace;letter-spacing:.02em}
  .hand{font-family:'Caveat',cursive}
  ::selection{background:var(--clay);color:var(--paper)}
  /* paper grain */
  .grain::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:99;
    background-image:radial-gradient(rgba(31,36,24,.035) 1px,transparent 1.4px);
    background-size:3px 3px;mix-blend-mode:multiply;opacity:.7;
  }
  .vignette::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:98;
    background:radial-gradient(ellipse at center,transparent 55%,rgba(31,36,24,.10) 100%);
  }
</style>
</head>
